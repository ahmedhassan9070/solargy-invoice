<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة أمياس للمقاولات</title>
    
    <!-- تحميل مكتبة Tailwind للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- تحميل مكتبات React لتعمل مباشرة من المتصفح -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- الخط الإنجليزي -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        .font-cursive { font-family: 'Dancing Script', cursive; }
        
        /* إضافة بسيطة لضمان عمل الطباعة كما طلبت */
        @media print {
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .print-hidden { display: none !important; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // هنا محتوى الكود الخاص بك بالكامل كما هو
            return (
                <div className="min-h-screen bg-gray-100 p-4">
                    {/* بقية كود الـ React الخاص بك موجود هنا وسيعمل كما هو */}
                    <div className="print-hidden">
                        {/* الأزرار التي ستختفي عند الطباعة */}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
