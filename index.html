<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة أمياس للمقاولات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        @media print { 
            .print-hidden { display: none !important; }
            body { background-color: white; }
        }
    </style>
</head>
<body class="bg-gray-100 py-10">

    <div class="max-w-4xl mx-auto bg-white p-10 shadow-2xl rounded-lg">
        <!-- Header -->
        <div class="flex justify-between items-center border-b-2 border-indigo-900 pb-6 mb-8">
            <h1 class="text-3xl font-bold text-indigo-900">شركة أمياس للمقاولات</h1>
            <h1 class="text-4xl font-bold text-indigo-900" style="font-family: 'Dancing Script', cursive;">Amias</h1>
        </div>

        <!-- Info -->
        <div class="flex justify-between mb-8 font-semibold text-gray-700">
            <div>التاريخ: <input type="text" class="border-b outline-none w-32" value="13/06/2026"></div>
            <div>العميل: <input type="text" class="border-b outline-none w-48" placeholder="اسم العميل..."></div>
        </div>

        <!-- Table -->
        <table class="w-full border-collapse border border-gray-300 text-center mb-6">
            <thead class="bg-indigo-900 text-white">
                <tr>
                    <th class="border p-3">البيان</th>
                    <th class="border p-3">الكمية</th>
                    <th class="border p-3">السعر</th>
                    <th class="border p-3">الإجمالي</th>
                    <th class="border p-3 print-hidden">إجراء</th>
                </tr>
            </thead>
            <tbody id="itemsBody">
                <tr>
                    <td class="border p-2"><input type="text" class="w-full outline-none text-center"></td>
                    <td class="border p-2"><input type="number" class="w-full outline-none text-center qty" value="1" oninput="calculate()"></td>
                    <td class="border p-2"><input type="number" class="w-full outline-none text-center price" value="0" oninput="calculate()"></td>
                    <td class="border p-2 total font-bold">0</td>
                    <td class="border p-2 print-hidden"><button onclick="this.parentElement.parentElement.remove(); calculate()" class="text-red-500 font-bold">حذف</button></td>
                </tr>
            </tbody>
        </table>

        <button onclick="addRow()" class="print-hidden bg-indigo-900 text-white px-6 py-2 rounded mb-8 font-bold hover:bg-indigo-800 transition">إضافة صنف</button>

        <div class="text-xl font-bold border-t pt-4 text-indigo-900">
            الإجمالي النهائي: <span id="grandTotal">0</span> جنيه سوداني
        </div>

        <div class="mt-8 text-gray-600">
            <p class="font-bold">ملاحظات:</p>
            <textarea class="w-full border p-2 mt-2 rounded" rows="3">10 سنوات ضمان للألواح وسنة للنظام. المتابعة ما بعد التركيب.</textarea>
        </div>

        <button onclick="window.print()" class="print-hidden mt-8 w-full bg-green-600 text-white py-3 rounded text-lg font-bold hover:bg-green-700 transition">طباعة الفاتورة</button>
    </div>

    <script>
        function addRow() {
            const tbody = document.getElementById('itemsBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="border p-2"><input type="text" class="w-full outline-none text-center"></td>
                <td class="border p-2"><input type="number" class="w-full outline-none text-center qty" value="1" oninput="calculate()"></td>
                <td class="border p-2"><input type="number" class="w-full outline-none text-center price" value="0" oninput="calculate()"></td>
                <td class="border p-2 total font-bold">0</td>
                <td class="border p-2 print-hidden"><button onclick="this.parentElement.parentElement.remove(); calculate()" class="text-red-500 font-bold">حذف</button></td>
            `;
            tbody.appendChild(row);
        }

        function calculate() {
            let grandTotal = 0;
            document.querySelectorAll('#itemsBody tr').forEach(row => {
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const price = parseFloat(row.querySelector('.price').value) || 0;
                const total = qty * price;
                row.querySelector('.total').innerText = total;
                grandTotal += total;
            });
            document.getElementById('grandTotal').innerText = grandTotal;
        }
    </script>
</body>
</html>
