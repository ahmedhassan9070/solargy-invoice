<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة شركة أمياس للمقاولات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { 
            .print-hidden { display: none !important; }
            body { background-color: white; padding: 0; }
            #invoice { border: none; box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div id="invoice" class="max-w-4xl mx-auto bg-white p-8 shadow-lg border border-gray-200">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-blue-900">شركة أمياس للمقاولات</h1>
            <div class="text-left font-bold text-blue-900">Amias Contracting</div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>التاريخ: <input type="text" class="border-b outline-none w-full" value="13/06/2026"></div>
            <div>العميل: <input type="text" class="border-b outline-none w-full" placeholder="اسم العميل..."></div>
        </div>

        <table class="w-full border-collapse border border-gray-300 text-center mb-6">
            <thead class="bg-blue-900 text-white">
                <tr>
                    <th class="border p-2">البيان</th>
                    <th class="border p-2">الكمية</th>
                    <th class="border p-2">السعر</th>
                    <th class="border p-2">الإجمالي</th>
                    <th class="border p-2 print-hidden">إجراء</th>
                </tr>
            </thead>
            <tbody id="itemsBody">
                <tr>
                    <td class="border p-2"><input type="text" class="w-full outline-none"></td>
                    <td class="border p-2"><input type="number" class="w-full outline-none qty" value="1" oninput="calculate()"></td>
                    <td class="border p-2"><input type="number" class="w-full outline-none price" value="0" oninput="calculate()"></td>
                    <td class="border p-2 total font-bold">0</td>
                    <td class="border p-2 print-hidden"><button onclick="this.parentElement.parentElement.remove(); calculate()" class="text-red-500 font-bold">حذف</button></td>
                </tr>
            </tbody>
        </table>

        <button onclick="addRow()" class="print-hidden bg-blue-900 text-white px-4 py-2 rounded mb-6">+ إضافة صنف</button>

        <div class="text-xl font-bold border-t pt-4">
            الإجمالي النهائي: <span id="grandTotal">0</span> جنيه سوداني
        </div>

        <div class="mt-8">
            <p class="font-bold">ملاحظات:</p>
            <textarea class="w-full border p-2 mt-2" rows="3">10 سنوات ضمان للألواح وسنة للنظام.</textarea>
        </div>

        <button onclick="window.print()" class="print-hidden mt-8 w-full bg-green-600 text-white py-3 rounded text-lg font-bold">طباعة الفاتورة</button>
    </div>

    <script>
        function addRow() {
            const tbody = document.getElementById('itemsBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="border p-2"><input type="text" class="w-full outline-none"></td>
                <td class="border p-2"><input type="number" class="w-full outline-none qty" value="1" oninput="calculate()"></td>
                <td class="border p-2"><input type="number" class="w-full outline-none price" value="0" oninput="calculate()"></td>
                <td class="border p-2 total font-bold">0</td>
                <td class="border p-2 print-hidden"><button onclick="this.parentElement.parentElement.remove(); calculate()" class="text-red-500 font-bold">حذف</button></td>
            `;
            tbody.appendChild(row);
        }

        function calculate() {
            let grandTotal = 0;
            document.querySelectorAll('#itemsBody tr').forEach(row => {
                const qty = parseFloat(row.querySelector('.qty').value) || 0;
                const price = parseFloat(row.querySelector('.price').value) || 0;
                const total = qty * price;
                row.querySelector('.total').innerText = total;
                grandTotal += total;
            });
            document.getElementById('grandTotal').innerText = grandTotal;
        }
    </script>
</body>
</html>
