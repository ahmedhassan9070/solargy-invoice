<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاتورة شركة أمياس للمقاولات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            .print-hidden { display: none !important; }
            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="max-w-4xl mx-auto bg-white p-8 shadow-xl min-h-[90vh] flex flex-col relative">
                    {/* Header */}
                    <div className="border-b-2 border-blue-900 pb-4 mb-6">
                        <h1 className="text-3xl font-bold text-blue-900 text-center">شركة أمياس للمقاولات</h1>
                    </div>

                    {/* Table */}
                    <table className="w-full border-collapse border border-gray-300 text-center mb-6">
                        <thead className="bg-blue-900 text-white">
                            <tr>
                                <th className="border p-2">البيان</th>
                                <th className="border p-2">الكمية</th>
                                <th className="border p-2">السعر</th>
                                <th className="border p-2">الإجمالي</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td className="border p-2"><input type="text" className="w-full text-center outline-none" defaultValue="أعمال تنفيذية" /></td>
                                <td className="border p-2"><input type="number" className="w-full text-center outline-none" defaultValue="1" /></td>
                                <td className="border p-2"><input type="number" className="w-full text-center outline-none" defaultValue="0" /></td>
                                <td className="border p-2">0</td>
                            </tr>
                        </tbody>
                    </table>

                    {/* Contact & Footer */}
                    <div className="mt-auto border-t pt-4">
                        <div className="flex justify-between items-center bg-blue-900 text-white p-4 rounded">
                            <div className="font-bold">📞 0963811138 - 0991090140</div>
                            <div className="font-bold">📧 amiasgc@gmail.com</div>
                            <div className="border bg-white p-1 text-black font-bold">الباركود</div>
                        </div>
                    </div>

                    <button onClick={() => window.print()} className="print-hidden mt-6 bg-green-600 text-white py-3 rounded w-full font-bold">طباعة الفاتورة</button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
